<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<title>Stripe-Level Auth UI</title>

<style>

/* =======================
   DESIGN SYSTEM
======================= */

:root{
    --bg:#0b1220;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#6b7280;
    --primary:#635bff;
    --border:#e5e7eb;
    --radius:14px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, system-ui;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg);
}

/* WRAPPER */
.wrapper{
    width:920px;
    height:560px;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.5);
    background:white;
}

/* LEFT */
.left{
    width:42%;
    background:linear-gradient(135deg,#635bff,#4f46e5);
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h1{
    font-size:28px;
    margin-bottom:12px;
}

.left p{
    font-size:14px;
    opacity:0.9;
    line-height:1.5;
}

/* RIGHT */
.right{
    width:58%;
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* TEXT */
h2{
    font-size:26px;
    color:var(--text);
    margin-bottom:6px;
}

small{
    color:var(--muted);
}

/* INPUT */
.input{
    margin-top:18px;
}

.input-box{
    position:relative;
}

.input-box i{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:#9ca3af;
}

input{
    width:100%;
    padding:12px 12px 12px 38px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    outline:none;
    transition:0.2s;
    font-size:14px;
}

input:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(99,91,255,0.15);
}

/* BUTTON */
button{
    width:100%;
    margin-top:22px;
    padding:12px;
    border:none;
    border-radius:var(--radius);
    background:var(--primary);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-1px);
    box-shadow:0 10px 20px rgba(99,91,255,0.2);
}

button:active{
    transform:scale(0.98);
}

/* FOOTER */
.bottom{
    margin-top:18px;
    font-size:13px;
    color:var(--muted);
    text-align:center;
}

.bottom a{
    color:var(--primary);
    text-decoration:none;
    font-weight:600;
}

/* RESPONSIVE */
@media(max-width:900px){
    .wrapper{
        flex-direction:column;
        width:92%;
        height:auto;
    }
    .left, .right{
        width:100%;
        padding:30px;
    }
}

</style>
</head>

<body>

<div class="wrapper">

    <!-- LEFT PANEL -->
    <div class="left">
        <h1>Payments infrastructure for the internet</h1>
        <p>
            Stripe-level UI clone with modern authentication flow, clean layout and production-style UX.
        </p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">

        <div id="formTitle">
            <h2>Create your account</h2>
            <small id="subText">Start building in minutes</small>
        </div>

        <div class="input">
            <div class="input-box">
                <i class="fa fa-user"></i>
                <input type="text" placeholder="Full name">
            </div>
        </div>

        <div class="input">
            <div class="input-box">
                <i class="fa fa-envelope"></i>
                <input type="text" placeholder="Email address">
            </div>
        </div>

        <div class="input">
            <div class="input-box">
                <i class="fa fa-lock"></i>
                <input type="password" placeholder="Password">
            </div>
        </div>

        <button id="mainBtn">Create account</button>

        <div class="bottom">
            <span id="bottomText">Already have an account?</span>
            <a href="#" id="toggleLink" onclick="toggleForm(event)">Sign in</a>
        </div>

    </div>

</div>

<script>
let isLogin = false;

function toggleForm(e){
    e.preventDefault();

    isLogin = !isLogin;

    const title = document.querySelector("#formTitle h2");
    const sub = document.getElementById("subText");
    const button = document.getElementById("mainBtn");
    const link = document.getElementById("toggleLink");
    const bottomText = document.getElementById("bottomText");

    if(isLogin){
        title.innerText = "Welcome back";
        sub.innerText = "Sign in to your account";
        button.innerText = "Sign in";
        link.innerText = "Create account";
        bottomText.innerText = "Don't have an account?";
    } else {
        title.innerText = "Create your account";
        sub.innerText = "Start building in minutes";
        button.innerText = "Create account";
        link.innerText = "Sign in";
        bottomText.innerText = "Already have an account?";
    }
}
</script>

</body>
</html>

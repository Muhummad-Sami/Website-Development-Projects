<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
    <center><h1>Payment Foam</h1></center>    
    <div> 
        <label for="name" > * Enter Your Name: </label>
        <input type="text" name="" id="" required><br><br>
    </div> 
    <div> 
        <label for="password"> *Enter Your Password: </label>
        <input type="password" name="" id="" required ><br><br>
    </div>
    <div>   
        <label for="number"> *Enter Your Age: </label>
        <input type="number" name="" id="" required ><br><br>
    </div>    
    <div>
        <label for="email"> *Enter Your Email</label>
        <input type="email" name="" id="" required ><br><br>
    </div>
    <fieldset>
    <legend> *Gender</legend><br>
    <label for="male">Male</label>
    <input type="radio" name="gender" id="male" required>
    <label for="female">Female</label>
    <input type="radio" name="gender" id="female" required>
    </fieldset><br>
    <label for="">Card Type</label>&nbsp;&nbsp;&nbsp;&nbsp;
    <select name="" id="Card Type">
        <option value="">--Select A Card-- </option>
        <option value="Card Type">Visa</option>
        <option value="Card Type">Master card</option>
        <option value="Card Type">Debit Card</option>
    </select><br><br>
    <div>
    <label for="adress"> *Adress: </label>
    <textarea name="adress" id="" rows="10" cols="40" required ></textarea>
    </div><br>
    <div>
    <label for="date"> *Expiration Date</label>&nbsp;&nbsp;&nbsp;&nbsp;
    <input type="date" name="date" id="" required >
    </div><br>
    <button>Submit</button>

    </form>
    
</body>
</html>

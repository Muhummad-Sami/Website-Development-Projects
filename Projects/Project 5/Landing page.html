<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6fb;
}

.card{
    text-align:center;
    background:white;
    padding:60px 40px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    animation:fadeUp 0.6s ease;
}

h1{
    color:#111827;
    font-size:36px;
}

p{
    color:#6b7280;
    margin:10px 0 25px;
}

button{
    padding:12px 26px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#111827;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(15px)}
    to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="card">
    <h1>Welcome</h1>
    <p>Modern authentication system UI</p>
    <button onclick="location.href='login.html'">Get Started</button>
</div>

</body>
</html>

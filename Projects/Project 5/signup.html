<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6fb;
}

.card{
    width:360px;
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    animation:fadeUp 0.6s ease;
}

h2{
    color:#111827;
}

small{
    color:#6b7280;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:1px solid #e5e7eb;
    border-radius:10px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#111827;
}

.bottom{
    text-align:center;
    margin-top:15px;
    color:#6b7280;
    font-size:14px;
}

a{
    color:#2563eb;
    text-decoration:none;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(15px)}
    to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="card">
    <h2>Create Account</h2>
    <small>Join us today 🚀</small>

    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button>Sign Up</button>

    <div class="bottom">
        Already have account? <a href="login.html">Login</a>
    </div>
</div>

</body>
</html>
